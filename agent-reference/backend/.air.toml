root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/app"
  cmd = "go build -o ./tmp/app ./cmd/app"
  delay = 500
  exclude_dir = ["tmp", "data", "docs"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "toml"]
  kill_delay = 500
  send_interrupt = true
  stop_on_error = true

[log]
  main_only = true
